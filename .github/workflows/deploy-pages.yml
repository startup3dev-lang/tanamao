name: Publicar no GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o codigo
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ta pronto/package-lock.json

      - name: Instalar dependencias
        working-directory: ta pronto
        run: npm ci

      - name: Buildar sem derrubar o martelo
        working-directory: ta pronto
        run: npm run build

      - name: Preparar fallback das rotas
        working-directory: ta pronto
        run: cp dist/index.html dist/404.html

      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: ta pronto/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar no Pages
        id: deployment
        uses: actions/deploy-pages@v4
